name: Security contact request
description: Request private contact for a potential vulnerability. Do not include exploit details.
title: "[Security contact request]: "
labels: ["security", "needs-private-contact"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include exploit steps, proof-of-concept files, private logs, tokens, or server addresses in this public issue.
  - type: input
    id: addon
    attributes:
      label: Addon name and version
      placeholder: Example Addon 0.1.0
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Estimated severity
      options:
        - Low
        - Medium
        - High
        - Critical
        - Not sure
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Safe summary
      description: Describe the category only, without exploit details.
      placeholder: Example: possible command permission bypass in multiplayer.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I did not include exploit details in this public issue.
          required: true
        - label: I can provide details privately when contacted.
          required: true
